apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort  # 외부에서 접속 가능하도록 노드의 포트를 개방
  selector:
    app: nginx-app
  ports:
    - protocol: TCP
      port: 80        # 서비스 내부 포트
      targetPort: 80  # 컨테이너 포트
      nodePort: 30001 # 실제 외부에서 접속할 포트 (30000-32767 사이)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
